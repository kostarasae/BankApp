# Database settings
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:bankapp}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=validate
#spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.format_sql=true

# disable first time to generate create tables
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# make sure to use join fetch
spring.jpa.open-in-view=false

# JWT — secret-key must be set as env var APP_SECURITY_SECRET_KEY on Render
app.security.secret-key=${APP_SECURITY_SECRET_KEY}
app.security.jwt-expiration=10800000
app.security.jwt-issuer=https://api.codingfactory.gr

# Bank fees
bank.fee.checking=0.5
bank.fee.savings=1.0

# CORS — set ALLOWED_ORIGINS env var on Render (e.g. https://yourapp.onrender.com)
allowed.origins=${ALLOWED_ORIGINS:http://localhost:8080}

# File upload
file.upload.dir=uploads/
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB